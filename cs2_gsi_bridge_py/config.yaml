name: "CS2 GSI Bridge (Python Full State)"
version: "0.3.2"
slug: "cs2_gsi_bridge_py"
description: "Receives Counter-Strike 2 GSI posts, publishes every incoming state to MQTT, and exposes derived light pulse/color entities."
url: "https://github.com/YOUR_GITHUB_USERNAME/cs2-python-bridge-repo-v3"
startup: application
boot: auto
init: false
arch:
  - aarch64
  - amd64
ports:
  3001/tcp: 3001
options:
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_base_topic: cs2_bridge
  discovery_prefix: homeassistant
  publish_discovery: true
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str?
  mqtt_password: password?
  mqtt_base_topic: str
  discovery_prefix: str
  publish_discovery: bool
